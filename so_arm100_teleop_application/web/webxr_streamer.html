<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controller Streamer | Interface</title>
    <style>
        :root {
            --bg-deep: #0f1115;
            --bg-panel: #1a1d23;
            --accent: #3b82f6;
            --accent-hover: #60a5fa;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --status-green: #10b981;
            --status-red: #ef4444;
            --status-orange: #f59e0b;
            --border: #2d3139;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Status Indicators */
        .status-bar {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .status {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 4px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .connected::before { background: var(--status-green); }
        .disconnected::before { background: var(--status-red); }
        .waiting::before { background: var(--status-orange); }

        /* Configuration Panel */
        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            background: var(--bg-deep);
            border: 1px solid var(--border);
            color: white;
            padding: 12px;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--accent);
        }

        /* Primary Action */
        #startBtn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        #startBtn:hover { background: var(--accent-hover); }
        #startBtn:active { transform: translateY(1px); }
        #startBtn:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* Data Readout */
        .data-display {
            margin-top: 30px;
            font-family: 'SFMono-Regular', Consolas, monospace;
            font-size: 0.8rem;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            height: 200px;
            overflow-y: auto;
            color: #88c0d0; /* Soft cyan terminal color */
            border: 1px solid var(--border);
        }

        #xrCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.5;
        }

        /* Scrollbar Styling */
        .data-display::-webkit-scrollbar { width: 6px; }
        .data-display::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    </style>
</head>

<body>
    <canvas id="xrCanvas"></canvas>

    <div class="container">
        <header>
            <h1>SO_ARM100 TELEOP</h1>
            <p class="subtitle">WebXR to Desktop Controller Relay</p>
        </header>

        <div class="status-bar">
            <div id="wsStatus" class="status disconnected">Network: Offline</div>
            <div id="xrStatus" class="status waiting">System: Ready</div>
        </div>

        <div class="panel">
            <div class="config-grid">
                <div class="input-group">
                    <label for="serverIP">Endpoint IP</label>
                    <input type="text" id="serverIP" placeholder="192.168.1.x">
                </div>
                <div class="input-group">
                    <label for="serverPort">Port</label>
                    <input type="text" id="serverPort" value="9090">
                </div>
            </div>

            <button id="startBtn">Initialize Session</button>

            <div class="data-display" id="dataDisplay">
                System awaiting initialization...
            </div>
        </div>
    </div>

    <script>
        // Logic remains identical to your original code to ensure functionality 
        // Just keeping the core variable names and functions.
        let ws = null;
        let xrSession = null;
        let xrRefSpace = null;
        let gl = null;
        let xrGLLayer = null;

        const wsStatusEl = document.getElementById('wsStatus');
        const xrStatusEl = document.getElementById('xrStatus');
        const startBtn = document.getElementById('startBtn');
        const dataDisplay = document.getElementById('dataDisplay');
        const canvas = document.getElementById('xrCanvas');

        function initGL() {
            gl = canvas.getContext('webgl2', { xrCompatible: true }) || canvas.getContext('webgl', { xrCompatible: true });
            return !!gl;
        }

        function connectWebSocket() {
            const ip = document.getElementById('serverIP').value || window.location.hostname;
            const port = document.getElementById('serverPort').value;
            const protocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
            const url = `${protocol}://${ip}:${port}`;

            try {
                ws = new WebSocket(url);
                ws.onopen = () => {
                    wsStatusEl.textContent = 'Network: Connected';
                    wsStatusEl.className = 'status connected';
                };
                ws.onclose = () => {
                    wsStatusEl.textContent = 'Network: Offline';
                    wsStatusEl.className = 'status disconnected';
                    setTimeout(connectWebSocket, 2000);
                };
            } catch (e) { console.error(e); }
        }

        async function startXR() {
            if (!navigator.xr || !initGL()) return;
            try {
                const mode = await navigator.xr.isSessionSupported('immersive-ar') ? 'immersive-ar' : 'immersive-vr';
                xrSession = await navigator.xr.requestSession(mode, {
                    requiredFeatures: ['local-floor'],
                    optionalFeatures: ['hand-tracking']
                });

                xrStatusEl.textContent = `System: ${mode.toUpperCase()}`;
                xrStatusEl.className = 'status connected';
                startBtn.disabled = true;

                xrGLLayer = new XRWebGLLayer(xrSession, gl);
                await xrSession.updateRenderState({ baseLayer: xrGLLayer });
                xrRefSpace = await xrSession.requestReferenceSpace('local-floor');
                xrSession.requestAnimationFrame(onXRFrame);
            } catch (e) { alert(e.message); }
        }

        function onXRFrame(time, frame) {
            if (!xrSession) return;
            xrSession.requestAnimationFrame(onXRFrame);
            
            const data = { timestamp: time, controllers: {} };
            for (const inputSource of xrSession.inputSources) {
                if (!inputSource.gamepad) continue;
                const pose = inputSource.gripSpace ? frame.getPose(inputSource.gripSpace, xrRefSpace) : null;
                data.controllers[inputSource.handedness] = {
                    position: pose?.transform.position || null,
                    trigger: inputSource.gamepad.buttons[0]?.value || 0,
                    squeeze: inputSource.gamepad.buttons[1]?.value || 0
                };
            }

            if (ws?.readyState === WebSocket.OPEN) ws.send(JSON.stringify(data));
            updateDisplay(data);
        }

        function updateDisplay(data) {
            dataDisplay.textContent = JSON.stringify(data, null, 2);
        }

        document.getElementById('serverIP').value = window.location.hostname;
        startBtn.addEventListener('click', () => {
            connectWebSocket();
            startXR();
        });
    </script>
</body>
</html>
